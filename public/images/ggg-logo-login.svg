<svg width="460" height="240" viewBox="0 0 460 240" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>G.G.G — Go, Grab, Get Delivery</title>

  <!-- Icon mark -->
  <rect x="0" y="10" width="220" height="220" rx="40" fill="#6d28d9"/>
  <rect x="18" y="28" width="184" height="184" rx="28" fill="none" stroke="#7c3aed" stroke-width="1.5" opacity="0.5"/>

  <!-- Shadow G -->
  <text x="110" y="168" font-family="Georgia,'Times New Roman',serif" font-size="148" font-weight="700" fill="#ffffff" text-anchor="middle" letter-spacing="-6" opacity="0.10">G</text>

  <!-- Primary G -->
  <text x="72" y="158" font-family="Georgia,'Times New Roman',serif" font-size="110" font-weight="700" fill="#ffffff" text-anchor="middle">G</text>

  <!-- Secondary G -->
  <text x="152" y="158" font-family="Georgia,'Times New Roman',serif" font-size="110" font-weight="700" fill="#ffffff" text-anchor="middle" opacity="0.5">G</text>

  <!-- Motion arrow -->
  <path d="M148 168 L192 168 L180 156 M192 168 L180 180" fill="none" stroke="#a78bfa" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="192" cy="168" r="3" fill="#c4b5fd"/>

  <!-- Bottom strip -->
  <rect x="0" y="192" width="220" height="38" rx="0" fill="#3b0764" opacity="0.45"/>
  <text x="110" y="217" font-family="'Helvetica Neue',Arial,sans-serif" font-size="11" font-weight="600" fill="#c4b5fd" text-anchor="middle" letter-spacing="4">GO · GRAB · GET</text>

  <!-- Bottom corners rounded -->
  <rect x="0" y="192" width="40" height="38" fill="#3b0764" opacity="0.0"/>

  <!-- Wordmark -->
  <text x="248" y="98" font-family="Georgia,'Times New Roman',serif" font-size="68" font-weight="700" fill="#1a0533" text-anchor="start" letter-spacing="-1">G.G.G</text>
  <text x="250" y="130" font-family="'Helvetica Neue',Arial,sans-serif" font-size="14" font-weight="600" fill="#6d28d9" text-anchor="start" letter-spacing="4">DELIVERY</text>
  <line x1="250" y1="146" x2="440" y2="146" stroke="#6d28d9" stroke-width="1.5" opacity="0.25"/>
  <text x="250" y="174" font-family="'Helvetica Neue',Arial,sans-serif" font-size="13" fill="#1a0533" opacity="0.45" text-anchor="start" letter-spacing="0.5">Go. Grab. Get.</text>
  <text x="250" y="194" font-family="'Helvetica Neue',Arial,sans-serif" font-size="13" fill="#1a0533" opacity="0.45" text-anchor="start" letter-spacing="0.5">Fast delivery, every time.</text>

</svg>
